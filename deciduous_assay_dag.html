<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Deciduous Tooth Assay Workflow DAG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.header { background: #1e293b; color: white; padding: 10px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; flex-shrink: 0; }
.header-title { font-size: 14px; font-weight: 700; }
.header-sub { font-size: 10px; color: #94a3b8; }
.filters { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 10px; color: #94a3b8; white-space: nowrap; }
.filter-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid #475569; background: transparent; color: #cbd5e1; font-size: 10px; cursor: pointer; }
.filter-btn:hover { background: #334155; }
.filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
.filter-btn.active-red { background: #ef4444; border-color: #ef4444; color: white; }
.filter-btn.active-green { background: #10b981; border-color: #10b981; color: white; }
.filter-btn.active-gray { background: #64748b; border-color: #64748b; color: white; }
.legend { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-left: auto; }
.legend-item { display: flex; align-items: center; gap: 3px; font-size: 9px; color: #94a3b8; }
.legend-sq { width: 9px; height: 9px; border-radius: 2px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.main { display: flex; flex: 1; overflow: hidden; }
.dag-wrap { flex: 1; overflow: auto; background: #f8fafc; }
.dag-svg { display: block; }
.node-g { cursor: pointer; }
.node-g:hover rect.node-rect { filter: brightness(0.93); }
.details { width: 300px; flex-shrink: 0; background: white; border-left: 1px solid #e2e8f0; overflow-y: auto; }
.details-empty { display: flex; align-items: center; justify-content: center; height: 200px; color: #94a3b8; font-size: 12px; text-align: center; padding: 20px; line-height: 1.6; }
.details-inner { padding: 14px; }
.d-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 9px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.03em; }
.d-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.35; }
.d-stage { font-size: 10px; color: #64748b; margin-bottom: 10px; }
.d-tissues { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.d-tissue { padding: 2px 7px; border-radius: 20px; font-size: 9px; font-weight: 600; }
.d-section { margin-bottom: 10px; }
.d-section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 4px; }
.d-ref { display: flex; gap: 6px; font-size: 10px; color: #475569; line-height: 1.4; margin-bottom: 5px; }
.d-ref-num { flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%; background: #6366f1; color: white; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.d-box-blue { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
.d-text { font-size: 11px; line-height: 1.5; color: #374151; }
.d-box { border-radius: 5px; padding: 7px 9px; font-size: 11px; line-height: 1.5; }
.d-box-warn { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
.d-box-danger { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
.d-box-green { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
.d-box-gray { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }
.d-divider { border: none; border-top: 1px solid #f1f5f9; margin: 10px 0; }
</style>
</head>

// ─── GLOBAL HANDLERS (called from onclick attrs) ──────────────────────────────
function selectNode(id) { S.sel = (S.sel === id) ? null : id; render(); }
function setTissue(t)    { S.tissue = t; render(); }
function toggleEdge(t)   { S['show'+t] = !S['show'+t]; render(); }
function hoverEdge(i)    { S.hovEdge = i; render(); }
function clearHoverEdge(){ S.hovEdge = null; render(); }

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
const GRP_ORDER = ["Storage","At Acquisition","Whole Tooth","Post-Sectioning","Terminal"];
const COL_CX = { "Storage":120, "At Acquisition":380, "Whole Tooth":650, "Post-Sectioning":940, "Terminal":1230 };
const NW = 210, NH = 40, VGAP = 7, START_Y = 80;

const nodeById = {};
NODES.forEach(n => nodeById[n.id] = n);

function buildPositions(visibleIds) {
  const byGrp = {};
  GRP_ORDER.forEach(g => byGrp[g] = []);
  NODES.forEach(n => { if (visibleIds.has(n.id)) byGrp[n.g].push(n.id); });
  const pos = {};
  GRP_ORDER.forEach(g => {
    byGrp[g].forEach((id, i) => {
      pos[id] = { x: COL_CX[g], y: START_Y + i * (NH + VGAP) };
    });
  });
  return pos;
}

function svgH(pos) {
  let m = 0;
  Object.values(pos).forEach(p => { if (p.y + NH > m) m = p.y + NH; });
  return m + 60;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const TISSUES = ["All","Enamel","Dentin","Calculus","Pulp","Cementum"];

  // visible nodes
  const visNodes = S.tissue === "All"
    ? NODES
    : NODES.filter(n => n.t.includes(S.tissue) || n.t.includes("All"));
  const visIds = new Set(visNodes.map(n => n.id));

  const pos = buildPositions(visIds);
  const H = svgH(pos);
  const W = 1490;

  // ── EDGES SVG ──
  let edgeSVG = "";
  EDGES.forEach((e, i) => {
    if (!visIds.has(e.f) || !visIds.has(e.t)) return;
    const tkey = e.type === "Incompat" ? "Incompat" : e.type === "Pair" ? "Pair" : "Order";
    if (!S["show"+tkey]) return;
    const pf = pos[e.f], pt = pos[e.t];
    if (!pf || !pt) return;
    const x1 = pf.x + NW/2, y1 = pf.y + NH/2;
    const x2 = pt.x - NW/2, y2 = pt.y + NH/2;
    const cx = (x1 + x2) / 2;
    const d = `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;
    const col = e.type === "Incompat" ? "#ef4444" : e.type === "Pair" ? "#10b981" : "#94a3b8";
    const dash = e.type !== "Order" ? "stroke-dasharray='5,3'" : "";
    const w = e.type === "Incompat" ? 2 : 1.5;
    const hov = S.hovEdge === i;
    const opacity = hov ? 1 : 0.65;
    edgeSVG += `
      <path d="${d}" stroke="${col}" stroke-width="${hov ? w+1 : w}" ${dash}
        fill="none" marker-end="url(#arr-${e.type})"
        style="cursor:pointer;opacity:${opacity}"
        onmouseenter="hoverEdge(${i})" onmouseleave="clearHoverEdge()"
      />`;
    if (hov) {
      const mx = (x1+x2)/2, my = Math.min(y1,y2) + Math.abs(y2-y1)/2;
      edgeSVG += `<text x="${mx}" y="${my-6}" text-anchor="middle" font-size="8" fill="${col}" pointer-events="none"
        style="background:white">${e.lbl}</text>`;
    }
  });

  // ── COLUMN HEADERS & BACKGROUNDS ──
  let colSVG = "";
  GRP_ORDER.forEach(g => {
    const m = GM[g];
    const cnt = visNodes.filter(n=>n.g===g).length;
    colSVG += `
      <rect x="${COL_CX[g]-NW/2-8}" y="12" width="${NW+16}" height="${H-22}" rx="8" fill="${m.hdr}" opacity="0.04"/>
      <rect x="${COL_CX[g]-NW/2-6}" y="18" width="${NW+12}" height="28" rx="6" fill="${m.hdr}" opacity="0.88"/>
      <text x="${COL_CX[g]}" y="37" text-anchor="middle" font-size="9.5" font-weight="700" fill="white"
        letter-spacing="0.05em">${g.toUpperCase()} (${cnt})</text>`;
  });

  // ── NODES SVG ──
  let nodeSVG = "";
  const dotC = {"All":"#94a3b8","Enamel":"#a78bfa","Dentin":"#fb923c","Calculus":"#84cc16","Pulp":"#ec4899","Cementum":"#38bdf8","Root":"#fdba74"};
  visNodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const m = GM[n.g];
    const isSel = S.sel === n.id;
    const lx = p.x - NW/2, ly = p.y;
    const rawLabel = n.label;
    const short = rawLabel.length > 34 ? rawLabel.slice(0,32)+"…" : rawLabel;
    let dots = "";
    n.t.forEach((t,ti) => {
      dots += `<circle cx="${lx+NW-12-ti*11}" cy="${ly+NH/2}" r="4" fill="${dotC[t]||'#94a3b8'}" opacity="0.9" pointer-events="none"/>`;
    });
    nodeSVG += `
      <g onclick="selectNode('${n.id}')" style="cursor:pointer">
        <rect class="node-rect" x="${lx}" y="${ly}" width="${NW}" height="${NH}" rx="5"
          fill="${m.fill}" stroke="${isSel ? '#f59e0b' : m.stroke}"
          stroke-width="${isSel ? 2.5 : 1.1}"/>
        <text x="${lx+7}" y="${ly+14}" font-size="7.5" font-weight="700" fill="${m.text}" pointer-events="none">${n.g.toUpperCase()}</text>
        <text x="${lx+7}" y="${ly+27}" font-size="9.5" fill="#1e293b" pointer-events="none">${short}</text>
        ${dots}
      </g>`;
  });

  // ── DETAILS PANEL ──
  let detailsHTML = "";
  if (S.sel && nodeById[S.sel]) {
    const n = nodeById[S.sel];
    const m = GM[n.g];
    const tissueBadges = n.t.map(t => {
      const tm = TM[t] || TM["All"];
      return `<span class="d-tissue" style="background:${tm.fill};color:${tm.stroke};border:1px solid ${tm.stroke}">${t}</span>`;
    }).join("");
    const isDanger = n.constraint && (n.constraint.includes("⚠") || n.constraint.toLowerCase().includes("forecloses all"));
    const constraintClass = isDanger ? "d-box d-box-danger" : "d-box d-box-warn";
    detailsHTML = `<div class="details-inner">
      <span class="d-badge" style="background:${m.fill};color:${m.text};border:1px solid ${m.stroke}">${n.g}</span>
      <div class="d-title">${n.label}</div>
      <div class="d-stage">${n.stage}</div>
      <div class="d-tissues">${tissueBadges}</div>
      <hr class="d-divider">
      <div class="d-section">
        <div class="d-section-title">Consumes / Damages</div>
        <div class="d-box d-box-gray">${n.consumes}</div>
      </div>
      <div class="d-section">
        <div class="d-section-title">Preserves / Leaves Available</div>
        <div class="d-text">${n.preserves}</div>
      </div>
      <div class="d-section">
        <div class="d-section-title">Key Ordering Constraint</div>
        <div class="${constraintClass}">${n.constraint}</div>
      </div>
      <div class="d-section">
        <div class="d-section-title">Good Pairings / Collaborations</div>
        <div class="d-box d-box-green">${n.pairs}</div>
      </div>
      ${n.ref1 ? `<hr class="d-divider">
      <div class="d-section">
        <div class="d-section-title">References</div>
        <div class="d-ref"><span class="d-ref-num">1</span>${n.ref1}</div>
        ${n.ref2 ? `<div class="d-ref"><span class="d-ref-num">2</span>${n.ref2}</div>` : ''}
      </div>
      ${n.note ? `<div class="d-section">
        <div class="d-section-title">Deciduous Note</div>
        <div class="d-box d-box-blue">${n.note}</div>
      </div>` : ''}` : ''}
    </div>`;
  } else {
    detailsHTML = `<div class="details-empty">Click any node to see ordering constraints, tissue details, and good collaboration pairings.</div>`;
  }

  // ── FILTER BUTTONS ──
  const tBtns = ["All","Enamel","Dentin","Calculus","Pulp","Cementum"].map(t =>
    `<button class="filter-btn ${S.tissue===t?'active':''}" onclick="setTissue('${t}')">${t}</button>`
  ).join("");

  const eBtns = [
    { key:"Order",   lbl:"Ordering",         cls:"active-gray" },
    { key:"Incompat",lbl:"Incompatibilities", cls:"active-red" },
    { key:"Pair",    lbl:"Good pairings",     cls:"active-green" },
  ].map(e =>
    `<button class="filter-btn ${S['show'+e.key] ? e.cls : ''}" onclick="toggleEdge('${e.key}')">${e.lbl}</button>`
  ).join("");

  // ── LEGEND ──
  const grpLeg = GRP_ORDER.map(g => {
    const m = GM[g];
    return `<div class="legend-item"><div class="legend-sq" style="background:${m.hdr}"></div>${g}</div>`;
  }).join("");
  const tisLeg = ["Enamel","Dentin","Calculus","Pulp","Cementum"].map(t => {
    const m = TM[t];
    return `<div class="legend-item"><div class="legend-dot" style="background:${m.dot}"></div>${t}</div>`;
  }).join("");

  // ── ASSEMBLE ──
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div>
        <div class="header-title">Deciduous Tooth Assay Workflow DAG</div>
        <div class="header-sub">ECHO Workshop · Maximizing the Potential of Shed Teeth · April 22, 2026</div>
      </div>
      <div class="filters"><span class="filter-label">TISSUE:</span>${tBtns}</div>
      <div class="filters"><span class="filter-label">EDGES:</span>${eBtns}</div>
      <div class="legend">${grpLeg}&nbsp;&nbsp;${tisLeg}</div>
    </div>
    <div class="main">
      <div class="dag-wrap">
        <svg class="dag-svg" width="${W}" height="${H}">
          <defs>
            <marker id="arr-Order"   markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto"><path d="M0,0 L0,5 L7,2.5 z" fill="#94a3b8"/></marker>
            <marker id="arr-Incompat" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto"><path d="M0,0 L0,5 L7,2.5 z" fill="#ef4444"/></marker>
            <marker id="arr-Pair"    markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto"><path d="M0,0 L0,5 L7,2.5 z" fill="#10b981"/></marker>
          </defs>
          ${colSVG}
          <g id="edges">${edgeSVG}</g>
          <g id="nodes">${nodeSVG}</g>
        </svg>
      </div>
      <div class="details" id="details">${detailsHTML}</div>
    </div>`;
}

render();
</script>
</body>
</html>
